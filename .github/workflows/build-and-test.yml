name: CI-build-and-test

on:
  # Run on every push to main so Codecov gets a fresh coverage report for each
  # main commit. Without this the PR "base" coverage is frozen at the last main
  # commit that ever had a report uploaded, and every PR is compared against a
  # stale baseline.
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - "**/graphite-base/**"

# Least-privilege token plus the OIDC scope Codecov needs for tokenless uploads.
# `checks: write` is required by dorny/test-reporter.
permissions:
  contents: read
  checks: write
  id-token: write

env:
  JAVA_VERSION: 25

# Release PRs (head branch `release-please--*`, opened by release-please) only
# bump CHANGELOG.md and version.txt — no source changes — so every job below is
# skipped for them via `!startsWith(github.head_ref, 'release-please')`. This
# saves CI resources and lets the release PR go green immediately. On `push`
# events `github.head_ref` is empty, so main pushes still run the full suite
# (incl. the Codecov baseline). A required check skipped by a job-level `if:`
# counts as passing in branch protection, so the release PR stays mergeable.
# See DEV-6678.

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release-please') }}
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run webapi tests
        run: ./sbtx -v coverage webapi/test
      - name: Run ingest tests
        run: ./sbtx -v coverage ingest/test
      - name: Aggregate coverage
        run: ./sbtx -v coverageAggregate copyCoverageReport
      - name: WebApi Unit Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi Unit Test Results
          path: ./modules/webapi/target/test-reports/TEST-*.xml
          reporter: java-junit
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ./target/coverage-report/cobertura.xml

  test-bagit:
    name: Test bagit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run bagit tests
        run: ./sbtx -v bagit/test
      - name: Bagit Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Bagit Test Results
          path: ./modules/bagit/target/test-reports/TEST-*.xml
          reporter: java-junit

  test-jwt:
    name: Test jwt
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run jwt tests
        run: ./sbtx -v jwt/test
      - name: JWT Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: JWT Test Results
          path: ./modules/jwt/target/test-reports/TEST-*.xml
          reporter: java-junit

  test-shacl-validator:
    name: Test shacl-validator
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run shacl-validator tests
        run: ./sbtx -v shacl-validator/test
      - name: SHACL Validator Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: SHACL Validator Test Results
          path: ./modules/shacl-validator/target/test-reports/TEST-*.xml
          reporter: java-junit

  test-it:
    name: Build and IT test
    runs-on: ubuntu-latest # previously: buildjet-4vcpu-ubuntu-2204
    if: ${{ !startsWith(github.head_ref, 'release-please') }}
    concurrency:
      group: ${{ github.ref }}-it
      cancel-in-progress: true
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Build Fuseki image if modules/fuseki/ changed
        shell: bash
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD)
          if echo "$CHANGED" | grep -q "^modules/fuseki/"; then
            make docker-build-fuseki-image
          fi
      - name: Install Nix (Bazel drives the knora-sipi image build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run integration tests
        run: nix develop --command make test-it
      - name: WebApi IT Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi IT Test Results
          path: ./modules/test-it/target/test-reports/TEST-*.xml
          reporter: java-junit
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: ./target/coverage-report/cobertura.xml

  test-e2e:
    name: Build and E2E test
    runs-on: ubuntu-latest-large-runner
    if: ${{ !startsWith(github.head_ref, 'release-please') }}
    concurrency:
      group: ${{ github.ref }}-e2e
      cancel-in-progress: true
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Build Fuseki image if modules/fuseki/ changed
        shell: bash
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD)
          if echo "$CHANGED" | grep -q "^modules/fuseki/"; then
            make docker-build-fuseki-image
          fi
      - name: Install Nix (Bazel drives the knora-sipi image build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Build sipi image locally
        # `SipiTestContainer` runs `daschswiss/knora-sipi:latest`. The registry
        # version lags the PR; build the PR's version locally so the CLI surface
        # matches (relevant across major Sipi base bumps, e.g. v4 -> v5).
        run: nix develop --command make docker-build-sipi-image
      - name: Run end-to-end tests
        run: ./sbtx -v coverage "test-e2e/test" coverageAggregate copyCoverageReport
      - name: WebApi E2E Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi E2E Test Results
          path: ./modules/test-e2e/target/test-reports/TEST-*.xml
          reporter: java-junit
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: ./target/coverage-report/cobertura.xml

  upload-coverage:
    name: Upload coverage
    runs-on: ubuntu-latest
    needs: [build-and-test, test-it, test-e2e]
    # Coverage reporting is advisory, not a merge gate. Isolating the Codacy and
    # Codecov uploads in their own job means an outage in either (e.g. the
    # Codecov CLI's GPG bootstrap failing) shows up as a red `Upload coverage`
    # check instead of reddening a test job, and `continue-on-error` keeps it
    # from blocking merges or releases. A red test job therefore always means a
    # real test failure — never a coverage-upload hiccup.
    continue-on-error: true
    steps:
      # Checkout so Codecov can resolve the cobertura report's relative paths
      # against the source tree when building its file network.
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage
      - name: Upload unit coverage to codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/coverage-unit/cobertura.xml
      - name: Upload unit coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage/coverage-unit/cobertura.xml
          flags: unit
      - name: Upload integration coverage to codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/coverage-integration/cobertura.xml
      - name: Upload integration coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage/coverage-integration/cobertura.xml
          flags: integration
      - name: Upload e2e coverage to codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/coverage-e2e/cobertura.xml
      - name: Upload e2e coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage/coverage-e2e/cobertura.xml
          flags: e2e

  test-ingest-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: sbt
      - name: Install Nix (Bazel drives the knora-sipi image build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run integration tests
        run: nix develop --command make test-ingest-integration
      - name: WebApi Ingest Integration Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi Ingest Integration Test Results
          path: ./modules/test-ingest-integration/target/test-reports/TEST-*.xml
          reporter: java-junit
      # No coverage upload here: these tests exercise the ingest service via a
      # Docker container, so in-process scoverage instrumentation records 0%.
      # Uploading that report only dilutes the merged coverage. Ingest unit-test
      # coverage is uploaded by the `build-and-test` job instead.

  test-docs-build:
    name: Test docs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Checkout source
        uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - name: Install requirements (pip, npm, apt)
        run: |
          just docs-install-requirements
          npm install --global typedoc
          sudo apt-get install graphviz
      - name: markdownlint
        run: just markdownlint
      - name: Build docs
        run: just docs-build

  check-fuseki-version-consistency:
    name: Check Fuseki version consistency
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - uses: actions/checkout@v4
      - name: Assert modules/fuseki/Dockerfile, Dependencies.scala, and docker-compose.yml agree
        run: |
          set -euo pipefail
          DOCKERFILE_VER=$(grep '^ARG IMAGE_VERSION=' modules/fuseki/Dockerfile | cut -d= -f2 | tr -d '"[:space:]')
          DEPS_VER=$(grep 'val fusekiImage' project/Dependencies.scala | sed 's/.*:\([^"]*\)".*/\1/' | tr -d '[:space:]')
          COMPOSE_VER=$(grep 'image: daschswiss/apache-jena-fuseki:' docker-compose.yml | sed 's/.*apache-jena-fuseki://' | tr -d '[:space:]')
          echo "modules/fuseki/Dockerfile:  $DOCKERFILE_VER"
          echo "project/Dependencies.scala: $DEPS_VER"
          echo "docker-compose.yml:         $COMPOSE_VER"
          [ "$DOCKERFILE_VER" = "$DEPS_VER" ] || { echo "ERROR: Dockerfile ($DOCKERFILE_VER) != Dependencies.scala ($DEPS_VER)"; exit 1; }
          [ "$DOCKERFILE_VER" = "$COMPOSE_VER" ] || { echo "ERROR: Dockerfile ($DOCKERFILE_VER) != docker-compose.yml ($COMPOSE_VER)"; exit 1; }
          echo "All Fuseki versions match: $DOCKERFILE_VER"

  check-formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Check formatting
        run: make check

  docker-healthcheck:
    name: Run the healthcheck from the container
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install Nix (Bazel drives the knora-sipi image build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Build images locally
        # Build both knora-api and knora-sipi so docker compose picks up the
        # PR's images. The registry's :latest for knora-sipi lags by a merge,
        # which matters across major Sipi base-image bumps (e.g. v4 -> v5
        # changed CLI surface and the compose `command:`).
        run: |
          make docker-build-dsp-api-image
          nix develop --command make docker-build-sipi-image
      - name: Spin up the API container and wait for all healthchecks (incl. db and sipi) to pass
        run: docker compose up --wait api
