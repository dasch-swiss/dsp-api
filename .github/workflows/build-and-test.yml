name: CI-build-and-test

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - "**/graphite-base/**"

env:
  JAVA_VERSION: 25

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run webapi tests
        run: ./sbtx -v coverage webapi/test
      - name: Run ingest tests
        run: ./sbtx -v coverage ingest/test
      - name: Aggregate coverage
        run: ./sbtx -v coverageAggregate
      - name: WebApi Unit Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi Unit Test Results
          path: ./webapi/target/test-reports/TEST-*.xml
          reporter: java-junit
      - name: Upload coverage data to codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ./target/scala-3.3.7/coverage-report/cobertura.xml
      - name: Upload coverage data to codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./target/scala-3.3.7/coverage-report/cobertura.xml

  test-bagit:
    name: Test bagit
    runs-on: ubuntu-latest
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run bagit tests
        run: ./sbtx -v bagit/test
      - name: Bagit Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Bagit Test Results
          path: ./modules/bagit/target/test-reports/TEST-*.xml
          reporter: java-junit

  test-jwt:
    name: Test jwt
    runs-on: ubuntu-latest
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run jwt tests
        run: ./sbtx -v jwt/test
      - name: JWT Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: JWT Test Results
          path: ./modules/jwt/target/test-reports/TEST-*.xml
          reporter: java-junit

  test-shacl-validator:
    name: Test shacl-validator
    runs-on: ubuntu-latest
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Run shacl-validator tests
        run: ./sbtx -v shacl-validator/test
      - name: SHACL Validator Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: SHACL Validator Test Results
          path: ./modules/shacl-validator/target/test-reports/TEST-*.xml
          reporter: java-junit

  test-it:
    name: Build and IT test
    runs-on: ubuntu-latest # previously: buildjet-4vcpu-ubuntu-2204
    concurrency:
      group: ${{ github.ref }}-it
      cancel-in-progress: true
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Build Fuseki image if fuseki/ changed
        shell: bash
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD)
          if echo "$CHANGED" | grep -q "^fuseki/"; then
            make docker-build-fuseki-image
          fi
      - name: Run integration tests
        run: make test-it
      - name: WebApi IT Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi IT Test Results
          path: ./modules/test-it/target/test-reports/TEST-*.xml
          reporter: java-junit
      - name: Upload coverage data to codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ./target/scala-3.3.7/coverage-report/cobertura.xml
      - name: Upload coverage data to codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./target/scala-3.3.7/coverage-report/cobertura.xml

  test-e2e:
    name: Build and E2E test
    runs-on: ubuntu-latest-large-runner
    concurrency:
      group: ${{ github.ref }}-e2e
      cancel-in-progress: true
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Build Fuseki image if fuseki/ changed
        shell: bash
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD)
          if echo "$CHANGED" | grep -q "^fuseki/"; then
            make docker-build-fuseki-image
          fi
      - name: Run end-to-end tests
        run: ./sbtx "test-e2e/test"
      - name: WebApi E2E Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi E2E Test Results
          path: ./modules/test-e2e/target/test-reports/TEST-*.xml
          reporter: java-junit

  test-ingest-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: sbt
      - name: Run integration tests
        run: make test-ingest-integration
      - name: WebApi Ingest Integration Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi Ingest Integration Test Results
          path: ./modules/test-ingest-integration/target/test-reports/TEST-*.xml
          reporter: java-junit
      - name: Upload coverage data to codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ./target/scala-3.3.7/coverage-report/cobertura.xml
      - name: Upload coverage data to codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./target/scala-3.3.7/coverage-report/cobertura.xml

  test-docs-build:
    name: Test docs
    runs-on: ubuntu-latest
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Checkout source
        uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - name: Install requirements (pip, npm, apt)
        run: |
          just docs-install-requirements
          npm install --global typedoc
          sudo apt-get install graphviz
      - name: markdownlint
        run: just markdownlint
      - name: Build docs
        run: just docs-build

  check-fuseki-version-consistency:
    name: Check Fuseki version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert fuseki/Dockerfile, Dependencies.scala, and docker-compose.yml agree
        run: |
          set -euo pipefail
          DOCKERFILE_VER=$(grep '^ARG FUSEKI_VERSION=' fuseki/Dockerfile | cut -d= -f2 | tr -d '"[:space:]')
          DEPS_VER=$(grep 'val fusekiImage' project/Dependencies.scala | sed 's/.*:\([^"]*\)".*/\1/' | tr -d '[:space:]')
          COMPOSE_VER=$(grep 'image: daschswiss/apache-jena-fuseki:' docker-compose.yml | sed 's/.*apache-jena-fuseki://' | tr -d '[:space:]')
          echo "fuseki/Dockerfile:          $DOCKERFILE_VER"
          echo "project/Dependencies.scala: $DEPS_VER"
          echo "docker-compose.yml:         $COMPOSE_VER"
          [ "$DOCKERFILE_VER" = "$DEPS_VER" ] || { echo "ERROR: Dockerfile ($DOCKERFILE_VER) != Dependencies.scala ($DEPS_VER)"; exit 1; }
          [ "$DOCKERFILE_VER" = "$COMPOSE_VER" ] || { echo "ERROR: Dockerfile ($DOCKERFILE_VER) != docker-compose.yml ($COMPOSE_VER)"; exit 1; }
          echo "All Fuseki versions match: $DOCKERFILE_VER"

  check-formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Check formatting
        run: make check
