name: CI-build-and-test

on:
  # Run on every push to main to keep main green visible per-commit.
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - "**/graphite-base/**"

# Least-privilege token. `checks: write` is required by dorny/test-reporter.
permissions:
  contents: read
  checks: write

env:
  JAVA_VERSION: 25

# Release PRs (head branch `release-please--*`, opened by release-please) only
# bump CHANGELOG.md and version.txt — no source changes — so every job below is
# skipped for them via `!startsWith(github.head_ref, 'release-please')`. This
# saves CI resources and lets the release PR go green immediately. On `push`
# events `github.head_ref` is empty, so main pushes still run the full suite.
# A required check skipped by a job-level `if:` counts as passing in branch
# protection, so the release PR stays mergeable. See DEV-6678.

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release-please') }}
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install Nix (Bazel drives the build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run webapi + ingest unit tests
        run: nix develop --command bazel test --test_output=errors //modules/webapi:test //modules/ingest:test
      - name: Collect Bazel test XML
        if: success() || failure()
        run: |
          mkdir -p test-xml
          cp -L bazel-testlogs/modules/webapi/test/test.xml test-xml/webapi-test.xml || true
          cp -L bazel-testlogs/modules/ingest/test/test.xml test-xml/ingest-test.xml || true
      - name: WebApi Unit Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi Unit Test Results
          path: test-xml/*.xml
          reporter: java-junit

  test-bagit:
    name: Test bagit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install Nix (Bazel drives the build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run bagit tests
        run: nix develop --command bazel test --test_output=errors //modules/bagit:test
      - name: Collect Bazel test XML
        if: success() || failure()
        run: |
          mkdir -p test-xml
          cp -L bazel-testlogs/modules/bagit/test/test.xml test-xml/bagit-test.xml || true
      - name: Bagit Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Bagit Test Results
          path: test-xml/*.xml
          reporter: java-junit

  test-jwt:
    name: Test jwt
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install Nix (Bazel drives the build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run jwt tests
        run: nix develop --command bazel test --test_output=errors //modules/jwt:test
      - name: Collect Bazel test XML
        if: success() || failure()
        run: |
          mkdir -p test-xml
          cp -L bazel-testlogs/modules/jwt/test/test.xml test-xml/jwt-test.xml || true
      - name: JWT Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: JWT Test Results
          path: test-xml/*.xml
          reporter: java-junit

  test-shacl-validator:
    name: Test shacl-validator
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install Nix (Bazel drives the build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run shacl-validator tests
        run: nix develop --command bazel test --test_output=errors //modules/shacl-validator:test
      - name: Collect Bazel test XML
        if: success() || failure()
        run: |
          mkdir -p test-xml
          cp -L bazel-testlogs/modules/shacl-validator/test/test.xml test-xml/shacl-validator-test.xml || true
      - name: SHACL Validator Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: SHACL Validator Test Results
          path: test-xml/*.xml
          reporter: java-junit

  test-it:
    name: Build and IT test
    runs-on: ubuntu-latest # previously: buildjet-4vcpu-ubuntu-2204
    if: ${{ !startsWith(github.head_ref, 'release-please') }}
    concurrency:
      group: ${{ github.ref }}-it
      cancel-in-progress: true
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install Nix (Bazel drives the build and image loads)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run integration tests
        # `make test-it` loads the PR's sipi/ingest/fuseki images (via its
        # docker-load-test-images prerequisite) before running the Bazel tests,
        # so the PR's own images are exercised, not the registry's lagging :latest.
        run: nix develop --command make test-it
      - name: Collect Bazel test XML
        if: success() || failure()
        run: |
          mkdir -p test-xml
          cp -L bazel-testlogs/modules/test-it/test/test.xml test-xml/test-it-test.xml || true
          cp -L bazel-testlogs/modules/test-it/test_gravsearch_span/test.xml test-xml/test-it-gravsearch-span.xml || true
      - name: WebApi IT Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi IT Test Results
          path: test-xml/*.xml
          reporter: java-junit

  test-e2e:
    name: Build and E2E test
    runs-on: ubuntu-latest-large-runner
    if: ${{ !startsWith(github.head_ref, 'release-please') }}
    concurrency:
      group: ${{ github.ref }}-e2e
      cancel-in-progress: true
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install Nix (Bazel drives the build and image loads)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run end-to-end tests
        # `make test-e2e` loads the PR's sipi/ingest/fuseki images (via its
        # docker-load-test-images prerequisite) before running the Bazel tests.
        # This replaces the old "build sipi locally" step — the registry's
        # :latest lags the PR, which matters across major Sipi base bumps.
        run: nix develop --command make test-e2e
      - name: Collect Bazel test XML
        if: success() || failure()
        run: |
          mkdir -p test-xml
          cp -L bazel-testlogs/modules/test-e2e/test/test.xml test-xml/test-e2e-test.xml || true
      - name: WebApi E2E Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi E2E Test Results
          path: test-xml/*.xml
          reporter: java-junit

  test-ingest-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: sbt
      - name: Install Nix (Bazel drives the knora-sipi image build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run integration tests
        run: nix develop --command make test-ingest-integration
      - name: Collect Bazel test XML
        if: success() || failure()
        run: |
          mkdir -p test-xml
          cp -L bazel-testlogs/modules/test-ingest-integration/test/test.xml test-xml/test-ingest-integration-test.xml || true
      - name: WebApi Ingest Integration Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: WebApi Ingest Integration Test Results
          path: test-xml/*.xml
          reporter: java-junit

  test-docs-build:
    name: Test docs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Checkout source
        uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - name: Install requirements (pip, npm, apt)
        run: |
          just docs-install-requirements
          npm install --global typedoc
          sudo apt-get install graphviz
      - name: markdownlint
        run: just markdownlint
      - name: Build docs
        run: just docs-build

  check-fuseki-version-consistency:
    name: Check Fuseki version consistency
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - uses: actions/checkout@v4
      - name: Assert modules/fuseki/Dockerfile, Dependencies.scala, and docker-compose.yml agree
        run: |
          set -euo pipefail
          DOCKERFILE_VER=$(grep '^ARG IMAGE_VERSION=' modules/fuseki/Dockerfile | cut -d= -f2 | tr -d '"[:space:]')
          DEPS_VER=$(grep 'val fusekiImage' project/Dependencies.scala | sed 's/.*:\([^"]*\)".*/\1/' | tr -d '[:space:]')
          COMPOSE_VER=$(grep 'image: daschswiss/apache-jena-fuseki:' docker-compose.yml | sed 's/.*apache-jena-fuseki://' | tr -d '[:space:]')
          echo "modules/fuseki/Dockerfile:  $DOCKERFILE_VER"
          echo "project/Dependencies.scala: $DEPS_VER"
          echo "docker-compose.yml:         $COMPOSE_VER"
          [ "$DOCKERFILE_VER" = "$DEPS_VER" ] || { echo "ERROR: Dockerfile ($DOCKERFILE_VER) != Dependencies.scala ($DEPS_VER)"; exit 1; }
          [ "$DOCKERFILE_VER" = "$COMPOSE_VER" ] || { echo "ERROR: Dockerfile ($DOCKERFILE_VER) != docker-compose.yml ($COMPOSE_VER)"; exit 1; }
          echo "All Fuseki versions match: $DOCKERFILE_VER"

  check-formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Check formatting
        run: make check

  # Temporary drift gate for the Phase 6 sbt->Bazel `docker-image-tag` source
  # switch: asserts tools/workspace_status.sh's STABLE_GIT_VERSION byte-matches
  # sbt's `print dockerImageTag` on every PR. Relies on `preparation`'s
  # `fetch-depth: 0` checkout (full history + tags) — without tags, both sides
  # fall back identically to the bare short hash and the gate passes vacuously.
  # Remove once the sbt-parallel validation window closes.
  check-docker-image-tag:
    name: Check docker-image-tag (workspace_status vs sbt)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Assert workspace_status.sh matches sbt's dockerImageTag
        run: make check-docker-image-tag

  docker-healthcheck:
    name: Run the healthcheck from the container
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please') # gate-only, no coverage upload; release PRs skipped (DEV-6678)
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install Nix (Bazel drives the knora-sipi image build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Build images locally
        # Build both knora-api and knora-sipi so docker compose picks up the
        # PR's images. The registry's :latest for knora-sipi lags by a merge,
        # which matters across major Sipi base-image bumps (e.g. v4 -> v5
        # changed CLI surface and the compose `command:`). Both are now Bazel
        # targets, so both need to run inside the Nix dev shell.
        run: |
          nix develop --command make docker-build-dsp-api-image
          nix develop --command make docker-build-sipi-image
      - name: Spin up the API container and wait for all healthchecks (incl. db and sipi) to pass
        run: docker compose up --wait api
