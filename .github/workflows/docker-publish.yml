name: Docker publish Webapi and Sipi images

on:
  push:
    branches:
      - main

jobs:
  publish-from-branch:
    if: github.event_name != 'release'
    name: Publish
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.output_docker_image_tag.outputs.tag }}
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
      - name: Install Nix (Bazel drives the knora-sipi image build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Restore Bazel repository cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('MODULE.bazel.lock') }}
          restore-keys: bazel-repo-${{ runner.os }}-${{ runner.arch }}-
      - name: Set up Remote Build Execution (mTLS + flags)
        id: rbe
        uses: ./.github/actions/bazel-rbe
        with:
          stage: cache
          runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
      - name: Build and publish dsp-api/dsp-ingest/sipi image to Dockerhub
        env:
          RBE_FLAGS: ${{ steps.rbe.outputs.flags }}
        run: |
          echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin
          # The Bazel <-> NativeLink RBE mTLS handshake at "query remote execution capabilities"
          # intermittently drops (General OpenSslEngine problem / handshake timed out) and hard-fails
          # the whole publish, even though the backend is healthy (concurrent build-and-test runs on
          # the same commit succeed). --remote_local_fallback does not cover this startup capabilities
          # query, so retry the publish; a warm remote cache keeps each retry fast and re-pushing
          # already-published tags is idempotent. See docs/development/dsp-api-rbe.md.
          attempts=3
          for attempt in $(seq 1 "$attempts"); do
            echo "::group::just docker-publish (attempt ${attempt}/${attempts})"
            if nix develop --command just docker-publish $RBE_FLAGS; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "docker-publish attempt ${attempt}/${attempts} failed"
            if [ "$attempt" -lt "$attempts" ]; then
              sleep $((attempt * 15))
            fi
          done
          echo "::error::docker-publish failed after ${attempts} attempts"
          exit 1
      - name: Output docker image tag
        id: output_docker_image_tag
        run: echo "tag=$(nix develop --command just docker-image-tag | tr -d '\n')" >> "$GITHUB_OUTPUT"
        shell: bash # Explicit for fail-fast behaviour

  trigger-dev-deployment:
    name: Trigger deployment to DEV
    runs-on: ubuntu-latest
    needs: publish-from-branch
    steps:
      - name: Trigger deployment to DEV
        env:
          IMAGE_TAG: ${{ needs.publish-from-branch.outputs.tag }}
          JENKINS_BASIC_AUTH_USER: ${{ secrets.JENKINS_BASIC_AUTH_USER }}
          JENKINS_BASIC_AUTH_PASS: ${{ secrets.JENKINS_BASIC_AUTH_PASS }}
          JENKINS_DEV_WEBHOOK: ${{ secrets.JENKINS_DEV_WEBHOOK }}
        run: |
          curl -f -u "${JENKINS_BASIC_AUTH_USER}:${JENKINS_BASIC_AUTH_PASS}" \
               -X POST "${JENKINS_DEV_WEBHOOK}" \
               -d "Service=api&Version=${IMAGE_TAG}"
