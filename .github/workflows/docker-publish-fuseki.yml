name: Docker publish Fuseki image

on:
  push:
    branches:
      - main
    paths:
      - 'modules/fuseki/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel a publish mid-push

permissions:
  contents: read

jobs:
  publish-fuseki:
    name: Publish Fuseki image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.fuseki_version.outputs.version }}
    steps:
      - name: Run preparatory steps
        uses: dasch-swiss/dsp-api/.github/actions/preparation@main
      - name: Get Fuseki version
        id: fuseki_version
        run: |
          set -euo pipefail
          V=$(grep -oE 'apache-jena-fuseki:[^"]+' modules/fuseki/BUILD.bazel | head -1 | cut -d: -f2)
          [[ "$V" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "fuseki image version invalid: $V"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Install Nix (Bazel drives the image build)
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Restore Bazel repository cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('MODULE.bazel.lock') }}
          restore-keys: bazel-repo-${{ runner.os }}-${{ runner.arch }}-
      - name: Set up Remote Build Execution (mTLS + flags)
        id: rbe
        uses: ./.github/actions/bazel-rbe
        with:
          stage: cache
          runner-endpoint: ${{ vars.REMOTEBUILD_RUNNER_ENDPOINT }}
          ca-cert: ${{ secrets.REMOTEBUILD_CA_CERT }}
          client-cert: ${{ secrets.REMOTEBUILD_CLIENT_CERT }}
          client-key: ${{ secrets.REMOTEBUILD_CLIENT_KEY }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and publish Fuseki image to Docker Hub
        run: nix develop --command just docker-publish-fuseki-image ${{ steps.rbe.outputs.flags }}

  trigger-dev-deployment:
    name: Trigger deployment to DEV
    runs-on: ubuntu-latest
    needs: publish-fuseki
    permissions: {}
    steps:
      - name: Trigger deployment to DEV
        env:
          FUSEKI_VERSION: ${{ needs.publish-fuseki.outputs.version }}
          JENKINS_BASIC_AUTH_USER: ${{ secrets.JENKINS_BASIC_AUTH_USER }}
          JENKINS_BASIC_AUTH_PASS: ${{ secrets.JENKINS_BASIC_AUTH_PASS }}
          JENKINS_DEV_WEBHOOK: ${{ secrets.JENKINS_DEV_WEBHOOK }}
        run: |
          curl -f -u "${JENKINS_BASIC_AUTH_USER}:${JENKINS_BASIC_AUTH_PASS}" \
               -X POST "${JENKINS_DEV_WEBHOOK}" \
               --data-urlencode "Service=db" \
               --data-urlencode "Version=${FUSEKI_VERSION}"
