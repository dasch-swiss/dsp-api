coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

github_checks:
  annotations: false

# Coverage is produced by several independent CI jobs, each running a different
# sbt test scope against the same source: `unit` (build-and-test), `integration`
# (test-it) and `e2e` (test-e2e). Each upload is tagged with a flag so Codecov
# merges them per-commit instead of letting the last upload overwrite the rest.
#
# carryforward keeps the most recent value for any flag whose job did not upload
# on a given commit (a cancelled, skipped or transiently-failed run), so a single
# missing upload no longer collapses the reported coverage.
flag_management:
  default_rules:
    carryforward: true

# Per-sbt-project breakdown so coverage can be read for each module.
component_management:
  individual_components:
    - component_id: webapi
      name: webapi
      paths:
        - modules/webapi/**
    - component_id: ingest
      name: ingest
      paths:
        - modules/ingest/**
    - component_id: modules
      name: modules
      paths:
        - modules/**
